services:
  database:
    image: postgres:17-alpine
    container_name: ulam-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ulam_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: ulam-api
    depends_on:
      - database
    environment:
      - DATABASE_URL=postgres://user:password@database:5432/ulam_db?sslmode=disable
      - SERVER_PORT=8080
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./Frontend
    container_name: ulam-dashboard
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
